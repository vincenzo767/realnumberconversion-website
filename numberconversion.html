<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number System Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2e2e38;
      --accent: #c8f135;
      --accent2: #6c63ff;
      --text: #f0f0f5;
      --muted: #666680;
      --danger: #ff6b6b;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* ── background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── noise overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: .5;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    /* ── header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .badge {
      display: inline-block;
      background: var(--accent2);
      color: #fff;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .3rem .75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -.02em;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      margin-top: .5rem;
      color: var(--muted);
      font-size: .75rem;
      letter-spacing: .08em;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 0 0 1px rgba(108,99,255,.08), 0 24px 60px rgba(0,0,0,.5);
    }

    /* ── field group ── */
    .field {
      margin-bottom: 1.25rem;
      position: relative;
    }
    label {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
      font-weight: 700;
    }
    label .tag {
      background: var(--surface2);
      color: var(--accent);
      border-radius: 4px;
      padding: .1rem .4rem;
      font-size: .6rem;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      padding: .85rem 1.1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      text-transform: uppercase;
      -moz-appearance: textfield;
      appearance: textfield;
      letter-spacing: .04em;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; }

    input::placeholder { color: #3a3a50; font-weight: 400; font-size: 1rem; }

    input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(108,99,255,.18), 0 0 20px rgba(108,99,255,.1);
      transform: translateY(-1px);
    }
    input.active-source {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,241,53,.12), 0 0 20px rgba(200,241,53,.08);
    }
    input.has-value {
      color: var(--accent);
    }
    input.error {
      border-color: var(--danger);
      color: var(--danger);
      animation: shake .3s ease;
    }

    @keyframes shake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-4px)}
      75%{transform:translateX(4px)}
    }

    /* ── copy btn inside field ── */
    .field-wrap { position: relative; }
    .copy-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--border);
      border: none;
      color: var(--muted);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, color .2s, transform .15s;
      font-size: .85rem;
    }
    .copy-btn:hover {
      background: var(--accent2);
      color: #fff;
      transform: translateY(-50%) scale(1.15);
    }
    .copy-btn:active { transform: translateY(-50%) scale(.95); }
    .copy-btn.copied {
      background: var(--accent);
      color: #000;
    }

    /* ── divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── clear button ── */
    .btn-clear {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      width: 100%;
      padding: .75rem;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
      margin-top: .5rem;
    }
    .btn-clear:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(255,107,107,.05);
      transform: translateY(-2px);
    }
    .btn-clear:active { transform: translateY(0) scale(.98); }

    /* ── footer ── */
    footer {
      text-align: center;
      margin-top: 1.75rem;
      color: var(--muted);
      font-size: .65rem;
      letter-spacing: .08em;
      line-height: 1.8;
    }
    footer span { color: var(--accent2); }

    /* ── tooltip ── */
    .tooltip-wrap { position: relative; display: inline-flex; }
    .tooltip-wrap .tip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%) scale(.85);
      background: #1e1e2e;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .6rem;
      padding: .3rem .6rem;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all .15s;
      letter-spacing: .06em;
    }
    .tooltip-wrap:hover .tip {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    /* ── responsive ── */
    @media (max-width: 540px) {
      .card { padding: 1.25rem; }
      input { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="badge">✦ Programmer Tool</div>
      <h1>Convert <span>Any</span><br>Number</h1>
      <p class="subtitle">Decimal · Binary · Octal · Hexadecimal</p>
    </header>

    <div class="card">

      <!-- DECIMAL -->
      <div class="field">
        <label for="input1">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M4 6h4M6 4v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Decimal
          <span class="tag">Base 10</span>
        </label>
        <div class="field-wrap">
          <input type="number" id="input1" placeholder="0" autocomplete="off">
          <button class="copy-btn tooltip-wrap" data-for="input1" aria-label="Copy">
            <span class="tip">Copy</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>

      <!-- BINARY -->
      <div class="field">
        <label for="input2">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="7" y="1" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
          Binary
          <span class="tag">Base 2</span>
        </label>
        <div class="field-wrap">
          <input type="number" id="input2" placeholder="0" autocomplete="off">
          <button class="copy-btn" data-for="input2" aria-label="Copy">
            <span class="tip">Copy</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>

      <!-- OCTAL -->
      <div class="field">
        <label for="input3">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polygon points="6,1 11,4 11,8 6,11 1,8 1,4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Octal
          <span class="tag">Base 8</span>
        </label>
        <div class="field-wrap">
          <input type="number" id="input3" placeholder="0" autocomplete="off">
          <button class="copy-btn" data-for="input3" aria-label="Copy">
            <span class="tip">Copy</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>

      <div class="divider">hex</div>

      <!-- HEXADECIMAL -->
      <div class="field">
        <label for="input4">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L6 2l4 8H2z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
          Hexadecimal
          <span class="tag">Base 16</span>
        </label>
        <div class="field-wrap">
          <input type="text" id="input4" placeholder="0" autocomplete="off">
          <button class="copy-btn" data-for="input4" aria-label="Copy">
            <span class="tip">Copy</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-clear" id="clearBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        Clear all fields
      </button>
    </div>

    <footer>
      <p>Made with ♥ by <span>Vince L. Batawang</span></p>
      <p>Inspired by alnahian2003</p>
    </footer>
  </div>

  <script>
    const input1 = document.getElementById("input1");
    const input2 = document.getElementById("input2");
    const input3 = document.getElementById("input3");
    const input4 = document.getElementById("input4");
    const allInputs = [input1, input2, input3, input4];

    function clearError(el) { el.classList.remove('error'); }
    function setError(el) {
      el.classList.add('error');
      setTimeout(() => el.classList.remove('error'), 600);
    }

    function setActiveSource(el) {
      allInputs.forEach(i => i.classList.remove('active-source'));
      el.classList.add('active-source');
    }

    function updateValues(inputs) {
      inputs.forEach(({ el, val }) => {
        el.value = val === '' ? '' : val;
        el.classList.toggle('has-value', val !== '' && val !== undefined);
      });
    }

    function deciToAll() {
      const raw = input1.value.trim();
      if (raw === '') { clearAll(input1); return; }
      const n = parseInt(raw, 10);
      if (isNaN(n)) { setError(input1); return; }
      setActiveSource(input1);
      updateValues([
        { el: input2, val: n.toString(2) },
        { el: input3, val: n.toString(8) },
        { el: input4, val: n.toString(16).toUpperCase() },
      ]);
    }

    function binToAll() {
      const raw = input2.value.trim();
      if (raw === '') { clearAll(input2); return; }
      if (!/^[01]+$/.test(raw)) { setError(input2); return; }
      const n = parseInt(raw, 2);
      setActiveSource(input2);
      updateValues([
        { el: input1, val: n.toString(10) },
        { el: input3, val: n.toString(8) },
        { el: input4, val: n.toString(16).toUpperCase() },
      ]);
    }

    function octToAll() {
      const raw = input3.value.trim();
      if (raw === '') { clearAll(input3); return; }
      if (!/^[0-7]+$/.test(raw)) { setError(input3); return; }
      const n = parseInt(raw, 8);
      setActiveSource(input3);
      updateValues([
        { el: input1, val: n.toString(10) },
        { el: input2, val: n.toString(2) },
        { el: input4, val: n.toString(16).toUpperCase() },
      ]);
    }

    function hexToAll() {
      const raw = input4.value.trim();
      if (raw === '') { clearAll(input4); return; }
      if (!/^[0-9a-fA-F]+$/.test(raw)) { setError(input4); return; }
      const n = parseInt(raw, 16);
      setActiveSource(input4);
      updateValues([
        { el: input1, val: n.toString(10) },
        { el: input2, val: n.toString(2) },
        { el: input3, val: n.toString(8) },
      ]);
    }

    function clearAll(source) {
      allInputs.forEach(i => {
        if (i !== source) {
          i.value = '';
          i.classList.remove('has-value', 'active-source', 'error');
        }
      });
    }

    input1.addEventListener("input", deciToAll);
    input2.addEventListener("input", binToAll);
    input3.addEventListener("input", octToAll);
    input4.addEventListener("input", hexToAll);

    // Clear all
    document.getElementById("clearBtn").addEventListener("click", () => {
      allInputs.forEach(i => {
        i.value = '';
        i.classList.remove('has-value', 'active-source', 'error');
      });
      input1.focus();
    });

    // Copy buttons
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.for);
        if (!target.value) return;
        navigator.clipboard.writeText(target.value).then(() => {
          btn.classList.add('copied');
          const tip = btn.querySelector('.tip');
          if (tip) tip.textContent = 'Copied!';
          setTimeout(() => {
            btn.classList.remove('copied');
            if (tip) tip.textContent = 'Copy';
          }, 1500);
        });
      });
    });
  </script>
</body>
</html>
